name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Run security validation
        run: python demo/validate_submission.py

      - name: Verify tool registry
        run: |
          python -c "
          from find_evil.server import mcp
          tools = mcp._tool_manager.list_tools()
          names = {t.name for t in tools}
          bad = names & {'execute_shell_cmd','write_file','rm','dd','shell','bash'}
          assert not bad, f'SECURITY: destructive tools found: {bad}'
          print(f'{len(tools)} tools registered. Security check: PASSED')
          "
